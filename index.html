<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voucher List</title>

<!-- QR Generator -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 10px;
  padding: 10px;
}

.voucher {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 2px dashed #000;
  padding: 10px;
  background: #fff;
}

.left {
  width: 60%;
}

.code {
  font-size: 18px;
  font-weight: bold;
}

.right {
  text-align: center;
  position: relative;
}

.qr {
  width: 80px;
  height: 80px;
}

.price {
  margin-top: 5px;
  font-size: 16px;
  font-weight: bold;
  color: #fff;
  background: green;
  padding: 4px 8px;
  border-radius: 5px;
}

/* Print style */
@media print {
  body {
    background: #fff;
  }
}
</style>
</head>

<body>

<div class="container" id="voucherContainer"></div>

<script>
// Voucher data
const vouchers = [
"43152523","67867248","28398538","93330566","32961604",
"59694569","66012907","58657004","45925767","54381005",
"38413438","00339576","12885027","25670711","40195290",
"49575436","48500044","90148139","01743011","75124242",
"35269803","02731383","54957191","64379879","22159193",
"08512156","93494537","53477069","96527186","97161196",
"95733597","14583234","62508778","74765624","63650643",
"46890335","51322946","87069002","80773414","98973578",
"81288184","71176638","57369922","83566897","69344986",
"29263566","55518947","46492251","56533980","24661426"
];

const container = document.getElementById("voucherContainer");

vouchers.forEach(code => {
  const div = document.createElement("div");
  div.className = "voucher";

  div.innerHTML = `
    <div class="left">
      <div class="code">${code}</div>
      <div>Valid: 1 Day</div>
      <div>Usage: 1</div>
      <div>2026-04-16 → 2027-04-16</div>
    </div>
    <div class="right">
      <div id="qr-${code}"></div>
      <div class="price">PHP 20</div>
    </div>
  `;

  container.appendChild(div);

  // Generate QR
  new QRCode(document.getElementById(`qr-${code}`), {
    text: code,
    width: 80,
    height: 80
  });
});
</script>

</body>
</html>
