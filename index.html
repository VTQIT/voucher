''KAPTEN/LYCEL VOUCHER CODE''
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voucher Pro System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
}

.controls {
    margin: 10px;
}

textarea {
    width: 100%;
    margin-bottom: 10px;
}

/* GRID */
#hotspot-print-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 10px;
}

/* VOUCHER */
.voucher {
    text-align: center;
    padding: 10px 5px;
    height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

/* LOGO */
.logo img {
    width: 60px;
}

/* CODE */
.code {
    font-size: 34px;
    font-weight: bold;
    color: #555;
}

/* PRICE (TEXT ONLY, NO BOX) */
.price {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 1px;
}

/* 🎨 DIFFERENT COLOR PER PRICE */
.p10 { color: #6a1bb9; }  /* purple */
.p15 { color: #ff8800; }  /* orange */
.p20 { color: #2f3e9e; }  /* blue */
.p50 { color: #28a745; }  /* green */
.invalid { color: #999; }

/* TIME */
.time {
    font-size: 16px;
    font-weight: bold;
}

/* SCAN */
.scan {
    font-size: 16px;
    font-weight: bold;
    color: #556b2f;
}

/* QR */
.qr {
    display: flex;
    justify-content: center;
}

/* LINE */
.line {
    border-bottom: 2px solid #000;
    margin-top: 4px;
}

/* PRINT */
@media print {
    body { margin: 0; }

    #hotspot-print-grid {
        grid-template-columns: repeat(5, 1fr);
        grid-template-rows: repeat(10, 1fr);
        width: 8.5in;
        height: 11in;
        gap: 0;
    }

    .voucher {
        height: 100%;
        padding: 6px 3px;
        box-sizing: border-box;
    }

    .code { font-size: 24px; }
    .price { font-size: 18px; }
    .time { font-size: 12px; }
    .scan { font-size: 12px; }

    .qr canvas {
        width: 60px !important;
        height: 60px !important;
    }

    .controls { display: none; }
}
</style>
</head>

<body>

<div class="controls">
    <textarea id="inputCodes" rows="6" placeholder="Paste voucher text here..."></textarea>

    <button onclick="loadCodes()">Generate Vouchers</button>
    <button onclick="saveAsImage()">Save as Image</button>
    <button onclick="window.print()">Print</button>
</div>

<div id="hotspot-print-grid"></div>

<script>
const serverURL = "http://10.1.0.100";

// PRICE LOGIC
function getVoucherDetails(code) {
    const len = code.length;

    const pricingTable = {
        5: { price: "10.00", time: "4 hours", class: "p10" },
        7: { price: "15.00", time: "12 hours", class: "p15" },
        8: { price: "20.00", time: "24 hours", class: "p20" },
        9: { price: "50.00", time: "4 days", class: "p50" }
    };

    return pricingTable[len] || { price: "INVALID", time: "", class: "invalid" };
}

// LOAD
function loadCodes() {
    const raw = document.getElementById("inputCodes").value;

    let codes = raw.match(/\b\d{5,9}\b/g) || [];
    codes = codes.slice(0, 50);

    const container = document.getElementById("hotspot-print-grid");
    container.innerHTML = "";

    codes.forEach((code, i) => {
        const d = getVoucherDetails(code);

        const div = document.createElement("div");
        div.className = "voucher";

        div.innerHTML = `
            <div class="logo">
                <img src="logo.png">
            </div>

            <div class="code">${code}</div>

            <div class="price ${d.class}">${d.price}</div>
            <div class="time">${d.time}</div>

            <div class="scan">scan me</div>

            <div class="qr" id="qr${i}"></div>

            <div class="line"></div>
        `;

        container.appendChild(div);

        new QRCode(document.getElementById("qr"+i), {
            text: serverURL + "?code=" + code,
            width: 80,
            height: 80
        });
    });

    alert("✅ " + codes.length + " vouchers ready");
}

// SAVE IMAGE
function saveAsImage() {
    html2canvas(document.getElementById("hotspot-print-grid"), { scale: 2 })
    .then(canvas => {
        const link = document.createElement("a");
        link.download = "vouchers.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}
</script>

</body>
</html>
