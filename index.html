''KAPTEN/LYCEL VOUCHER CODE''
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voucher Pro System</title>

<!-- QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- EXPORT IMAGE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
}

/* CONTROLS */
.controls {
    margin: 10px;
}

textarea {
    width: 100%;
    margin-bottom: 10px;
}

/* SCREEN VIEW (preview only) */
#hotspot-print-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    padding: 10px;
}

/* VOUCHER */
.voucher {
    border: 1px solid #000;
    text-align: center;
    padding: 6px 4px;
    height: 160px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

/* REF */
.ref {
    position: absolute;
    top: 3px;
    right: 5px;
    font-size: 9px;
    color: #555;
}

/* CODE */
.code {
    font-size: 18px;
    font-weight: bold;
    margin-top: 8px;
}

/* PRICE */
.price {
    font-size: 13px;
    font-weight: bold;
    margin: 4px auto;
    padding: 2px 6px;
    border: 2px solid #000;
    border-radius: 6px;
    background: #000;
    color: #fff;
}

/* QR */
.qr {
    display: flex;
    justify-content: center;
}

/* 🔥 PRINT PERFECT 50 (5x10) */
@media print {
    body {
        margin: 0;
    }

    #hotspot-print-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        grid-template-rows: repeat(10, 1fr);
        width: 8.5in;
        height: 11in;
        gap: 0;
    }

    .voucher {
        width: 100%;
        height: 100%;
        border: 1px solid #000;
        padding: 4px;
        box-sizing: border-box;
        font-size: 10px;
    }

    .code {
        font-size: 14px;
    }

    .price {
        font-size: 10px;
        padding: 2px 4px;
    }

    .qr canvas {
        width: 50px !important;
        height: 50px !important;
    }

    .controls {
        display: none;
    }
}
</style>
</head>

<body>

<div class="controls">
    <textarea id="inputCodes" rows="6" placeholder="Paste ANY voucher text here..."></textarea>

    <button onclick="loadCodes()">Generate Vouchers</button>
    <button onclick="saveAsImage()">Save as Image</button>
    <button onclick="window.print()">Print</button>
</div>

<div id="hotspot-print-grid"></div>

<script>
// SERVER
const serverURL = "http://10.1.0.100";

// 🔥 AUTO PRICE BY DIGIT LENGTH
function getVoucherDetails(code) {
    const len = code.length;

    const pricingTable = {
        6: { price: "P10.00", time: "5hrs" },
        7: { price: "P15.00", time: "12hrs" },
        8: { price: "P20.00", time: "24hrs" }
    };

    return pricingTable[len] || { price: "INVALID", time: "" };
}

// REF GENERATOR
function generateRef() {
    const now = new Date();
    return "REF-" +
        now.getFullYear().toString().slice(-2) +
        (now.getMonth()+1).toString().padStart(2,"0") +
        now.getDate().toString().padStart(2,"0") +
        "-" +
        Math.floor(Math.random()*1000);
}

// LOAD + GENERATE
function loadCodes() {
    const raw = document.getElementById("inputCodes").value;

    let codes = raw.match(/\b\d{6,8}\b/g) || [];

    // 🔥 LIMIT TO EXACTLY 50
    codes = codes.slice(0, 50);

    const ref = generateRef();
    const container = document.getElementById("hotspot-print-grid");
    container.innerHTML = "";

    codes.forEach((code, i) => {
        const details = getVoucherDetails(code);

        const div = document.createElement("div");
        div.className = "voucher";

        div.innerHTML = `
            <div class="ref">${ref}</div>

            <div>
                <div class="code">${code}</div>
                <div class="price">${details.price} ${details.time ? "for " + details.time : ""}</div>
            </div>

            <div class="qr" id="qr${i}"></div>
        `;

        container.appendChild(div);

        new QRCode(document.getElementById("qr"+i), {
            text: serverURL + "?code=" + code + "&ref=" + ref,
            width: 60,
            height: 60
        });
    });

    alert("✅ Ready: " + codes.length + " vouchers (max 50)");
}

// SAVE IMAGE
function saveAsImage() {
    const element = document.getElementById("hotspot-print-grid");

    html2canvas(element, { scale: 2 }).then(canvas => {
        const link = document.createElement("a");
        link.download = "vouchers.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}
</script>

</body>
</html>
